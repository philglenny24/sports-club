name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Gathers your files
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp *.html *.css *.js *.jpg *.jpeg *.png *.svg deploy/ 2>/dev/null || true
          if [ -d "assets" ]; then cp -r assets deploy/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  # Deploy job: Actually puts them on the web
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4